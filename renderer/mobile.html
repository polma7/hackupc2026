<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>P2P Voting · Mobile</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --bg-soft: #111;
        --bg-card: #0f0f0f;
        --line: #1f1f1f;
        --line-2: #2a2a2a;
        --text: #e8e8e8;
        --text-dim: #8a8a8a;
        --text-mute: #5a5a5a;
        --accent: #b6ff3c;
        --accent-2: #79e34d;
        --danger: #ff5d5d;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: var(--bg); color: var(--text);
        font-family: var(--sans); font-size: 16px; line-height: 1.45;
        -webkit-font-smoothing: antialiased;
      }
      body {
        background-image:
          radial-gradient(ellipse at 20% -10%, rgba(182,255,60,0.08), transparent 50%),
          linear-gradient(180deg, var(--bg) 0%, #060606 100%);
        min-height: 100vh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      header {
        padding: 16px;
        border-bottom: 1px solid var(--line);
        display: flex; align-items: center; gap: 10px;
        position: sticky; top: 0; backdrop-filter: blur(8px);
        background: rgba(10,10,10,0.85);
        z-index: 5;
      }
      .mark {
        width: 24px; height: 24px; border-radius: 7px;
        background: var(--accent); color: #0a0a0a;
        display: grid; place-items: center; font-weight: 700; font-size: 13px;
        box-shadow: 0 0 14px rgba(182,255,60,0.45);
      }
      .brand { font-family: var(--mono); font-weight: 600; font-size: 14px; }
      .status {
        margin-left: auto; font-family: var(--mono); font-size: 11px;
        color: var(--text-dim); padding: 4px 8px;
        border: 1px solid var(--line-2); border-radius: 999px;
      }
      main { padding: 20px 16px 60px; max-width: 560px; margin: 0 auto; }
      h1 {
        font-size: 24px; font-weight: 600; letter-spacing: -0.02em;
        margin: 8px 0 4px;
      }
      h1 .accent { color: var(--accent); font-style: italic; font-weight: 500; }
      .lede { color: var(--text-dim); font-size: 14px; margin: 0 0 20px; }
      .card {
        background: var(--bg-card); border: 1px solid var(--line);
        border-radius: 14px; padding: 16px; margin-top: 14px;
      }
      .card h2 {
        font-size: 15px; margin: 0 0 8px; font-weight: 600;
        display: flex; align-items: center; gap: 8px;
      }
      .card h2::before {
        content: ''; width: 6px; height: 6px; border-radius: 50%;
        background: var(--accent); box-shadow: 0 0 8px var(--accent);
      }
      .muted { color: var(--text-dim); font-size: 13px; }
      button {
        width: 100%; padding: 14px 18px;
        border-radius: 10px; border: 1px solid var(--line-2);
        background: var(--bg-soft); color: var(--text);
        font-size: 15px; font-weight: 500; cursor: pointer;
        font-family: var(--sans);
      }
      button.primary {
        background: var(--accent); color: #0a0a0a; border-color: var(--accent);
        font-weight: 600;
      }
      button:disabled { opacity: 0.45; }
      input {
        width: 100%; padding: 12px 14px;
        border-radius: 10px; border: 1px solid var(--line-2);
        background: var(--bg-soft); color: var(--text);
        font-family: var(--mono); font-size: 13px; outline: none;
      }
      input:focus { border-color: var(--accent); }
      pre {
        font-family: var(--mono); font-size: 11px;
        background: var(--bg-soft); border: 1px solid var(--line);
        border-radius: 8px; padding: 10px;
        word-break: break-all; white-space: pre-wrap;
        color: var(--accent-2); margin: 6px 0 0;
      }
      .hidden { display: none !important; }
      .scanner-wrap {
        position: relative; aspect-ratio: 1 / 1;
        border-radius: 12px; overflow: hidden;
        background: #000; border: 1px solid var(--line-2);
        margin-top: 10px;
      }
      .scanner-wrap video {
        width: 100%; height: 100%; object-fit: cover;
      }
      .scanner-frame {
        position: absolute; inset: 14%;
        border: 2px solid var(--accent);
        border-radius: 12px;
        box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
        pointer-events: none;
      }
      .scanner-frame.hit { border-color: #fff; }
      .row { display: flex; gap: 8px; margin-top: 10px; }
      .row > * { flex: 1; }
      .options { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
      .options button {
        text-align: left; font-family: var(--mono); font-size: 14px;
        padding: 14px 16px;
      }
      .options button:disabled { color: var(--text-dim); }
      .badge {
        display: inline-block; font-family: var(--mono);
        font-size: 11px; padding: 3px 8px; border-radius: 6px;
        background: rgba(182,255,60,0.1);
        border: 1px solid rgba(182,255,60,0.25);
        color: var(--accent);
      }
      .stat {
        display: flex; justify-content: space-between;
        font-family: var(--mono); font-size: 12px;
        color: var(--text-dim);
        margin-top: 8px;
      }
      .stat strong { color: var(--text); }
      .err {
        color: var(--danger); font-family: var(--mono);
        font-size: 12px; margin-top: 8px; min-height: 14px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="mark">P</div>
      <div class="brand">P2P Voting · Mobile</div>
      <div class="status" id="status">Idle</div>
    </header>
    <main>
      <h1>Vote from your <span class="accent">phone</span>.</h1>
      <p class="lede">Scan the QR shown on the host PC, or paste the topic hash, to join the active poll.</p>

      <div id="join-card" class="card">
        <h2>Join a poll</h2>
        <div class="muted">Tap below to start the camera and scan the QR.</div>
        <div class="row">
          <button id="scan-btn" class="primary">Scan QR</button>
        </div>
        <div id="scanner" class="scanner-wrap hidden">
          <video id="video" playsinline muted></video>
          <div class="scanner-frame" id="scanner-frame"></div>
        </div>
        <div class="muted" style="margin-top:12px">Or paste it manually:</div>
        <div class="row">
          <input id="topic-input" type="text" placeholder="64 hex characters" autocomplete="off" />
        </div>
        <div class="row">
          <button id="manual-join-btn">Join with hash</button>
        </div>
        <div id="join-err" class="err"></div>
      </div>

      <div id="poll-card" class="card hidden">
        <h2>Active poll</h2>
        <div id="poll-state" class="muted">Connecting…</div>
        <div id="poll-body"></div>
        <div class="stat">
          <span>Topic</span>
          <strong id="poll-topic">…</strong>
        </div>
        <div class="stat">
          <span>Peers</span>
          <strong id="poll-peers">0</strong>
        </div>
      </div>
    </main>

    <script src="/jsqr.js"></script>
    <script src="/mobile.js"></script>
  </body>
</html>
