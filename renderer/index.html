<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>P2P Voting</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        background: #111;
        color: #f2f2f2;
      }

      .container {
        max-width: 900px;
        margin: 32px auto;
        padding: 0 16px 32px;
      }

      h1,
      h2 {
        margin: 0 0 8px;
      }

      .muted {
        color: #aaa;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        margin-left: 8px;
      }

      .badge.creator {
        background: #5b3aff;
        color: #fff;
      }

      .badge.voter {
        background: #2e7d32;
        color: #fff;
      }

      .card {
        background: #171717;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 16px;
        margin-top: 16px;
      }

      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      input,
      textarea {
        flex: 1;
        min-width: 220px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #1b1b1b;
        color: #f2f2f2;
      }

      button {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #242424;
        color: #f2f2f2;
        cursor: pointer;
      }

      button:hover {
        background: #303030;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      pre {
        padding: 12px;
        border-radius: 8px;
        background: #141414;
        border: 1px solid #2a2a2a;
        overflow: auto;
        word-break: break-all;
        white-space: pre-wrap;
      }

      ul {
        padding-left: 20px;
      }

      .options button {
        display: block;
        margin: 8px 0;
        width: 100%;
        text-align: left;
      }

      .hidden {
        display: none;
      }

      .countdown {
        font-variant-numeric: tabular-nums;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>P2P Voting<span id="role-badge" class="badge"></span></h1>
      <div class="muted" id="status">Starting...</div>

      <div id="topic-card" class="card">
        <h2 id="topic-heading">Topic to share</h2>
        <div class="muted" id="topic-help">Share this hash with voters.</div>
        <pre id="topic">...</pre>
        <div class="row">
          <button id="copy-topic-btn">Copy hash</button>
        </div>
        <div class="muted" style="margin-top:12px">Peers connected</div>
        <pre id="peers">0</pre>
      </div>

      <div id="join-card" class="card hidden">
        <h2>Join a poll</h2>
        <div class="muted">Paste the 64-char hex hash you received from the creator.</div>
        <div class="row">
          <input id="topic-input" type="text" placeholder="Paste 64 hex hash here" autocomplete="off" />
          <button id="join-btn">Join</button>
        </div>
      </div>

      <div id="poll-card" class="card hidden">
        <h2>Active poll</h2>
        <div id="poll-state" class="muted">Connecting...</div>
        <div id="poll-body"></div>
      </div>

      <div class="card">
        <h2>Events</h2>
        <ul id="events"></ul>
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
